name: StreamVault Pipeline

# This workflow downloads, transcodes, and uploads video content.
# Key inputs:
#   - file_idx: File index within torrent (0-based from Torrentio)
#   - torrent_name: Exact filename from Torrentio behaviorHints.filename
#
# File detection strategy:
#   1. Exact match by torrent_name (behaviorHints.filename)
#   2. Partial match by base filename
#   3. Fallback to any video file by extension

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'StreamVault job ID'
        required: true
        type: string
      magnet_uri:
        description: 'Magnet link to download'
        required: true
        type: string
      file_idx:
        description: 'File index within torrent'
        required: true
        type: string
        default: '0'
      torrent_name:
        description: 'Original torrent name from Torrentio'
        required: false
        type: string
        default: ''
      callback_url:
        description: 'Backend callback base URL'
        required: true
        type: string
      callback_token:
        description: 'Auth token for callbacks'
        required: true
        type: string
      discord_bot_token:
        description: 'Discord bot token for HLS upload'
        required: false
        type: string
        default: ''
      discord_channel_id:
        description: 'Discord channel ID for HLS upload'
        required: false
        type: string
        default: ''
      skip_download:
        description: 'Skip download, restore from checkpoint'
        required: false
        type: string
        default: 'false'
      skip_transcode:
        description: 'Skip transcode, restore from checkpoint'
        required: false
        type: string
        default: 'false'

env:
  CALLBACK_URL: ${{ inputs.callback_url }}
  CALLBACK_TOKEN: ${{ inputs.callback_token }}
  JOB_ID: ${{ inputs.job_id }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 jq bc ffmpeg

      - name: Restore download checkpoint
        if: inputs.skip_download == 'true'
        uses: actions/download-artifact@v4
        with:
          name: checkpoint-dl-${{ inputs.job_id }}
          path: ./downloads/

      - name: Download torrent
        if: inputs.skip_download != 'true'
        run: |
          chmod +x .github/scripts/*.sh
          .github/scripts/monitor-download.sh \
            "${{ inputs.job_id }}" \
            "${{ inputs.callback_url }}" \
            "${{ inputs.callback_token }}" \
            "${{ inputs.magnet_uri }}" \
            "$(( ${{ inputs.file_idx }} + 1 ))"

          # Report download checkpoint
          .github/scripts/callback.sh "${{ inputs.job_id }}" "checkpoint" \
            '{"checkpoint":"download","artifact_id":"checkpoint-dl-${{ inputs.job_id }}"}'

      - name: Save download checkpoint
        if: inputs.skip_download != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: checkpoint-dl-${{ inputs.job_id }}
          path: ./downloads/
          retention-days: 7
          if-no-files-found: warn

      - name: Detect source resolution
        id: detect
        run: |
          # Use exact filename from Torrentio behaviorHints.filename
          FILENAME="${{ inputs.torrent_name }}"
          INPUT_FILE=""
          
          if [ -n "$FILENAME" ]; then
            # Try exact match first
            INPUT_FILE=$(find ./downloads -type f -name "$FILENAME" \
              -not -name "*.log" -not -name "*.torrent" -not -name "*.aria2" \
              | head -1)
            
            if [ -n "$INPUT_FILE" ]; then
              echo "✓ Found exact file: $INPUT_FILE"
            else
              # Fallback: try partial match (in case filename has special chars)
              BASE_NAME=$(basename "$FILENAME" | sed 's/\.[^.]*$//')
              INPUT_FILE=$(find ./downloads -type f -name "*${BASE_NAME}*" \
                -not -name "*.log" -not -name "*.torrent" -not -name "*.aria2" \
                | head -1)
              if [ -n "$INPUT_FILE" ]; then
                echo "✓ Found file by partial match: $INPUT_FILE"
              fi
            fi
          fi
          
          # Last resort: find any video file
          if [ -z "$INPUT_FILE" ]; then
            INPUT_FILE=$(find ./downloads -type f \
              \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.avi" -o -iname "*.mov" \) \
              -not -name "*.log" -not -name "*.torrent" -not -name "*.aria2" \
              | head -1)
            if [ -n "$INPUT_FILE" ]; then
              echo "⚠ Fallback: found video by extension: $INPUT_FILE"
            fi
          fi
          
          if [ -z "$INPUT_FILE" ]; then
            echo "❌ Error: No video file found in ./downloads"
            ls -la ./downloads/
            exit 1
          fi
          
          echo "input_file=$INPUT_FILE" >> "$GITHUB_OUTPUT"
          echo "Input file: $INPUT_FILE"
          echo "File size: $(du -h "$INPUT_FILE" | cut -f1)"
          
          # Extract video height using ffprobe
          SOURCE_HEIGHT=$(ffprobe -v error -select_streams v:0 \
            -show_entries stream=height -of csv=p=n:0 "$INPUT_FILE" 2>/dev/null || echo "0")
          echo "source_height=$SOURCE_HEIGHT" >> "$GITHUB_OUTPUT"
          echo "Source height: ${SOURCE_HEIGHT}p"

      - name: Restore transcode checkpoint
        if: inputs.skip_transcode == 'true'
        uses: actions/download-artifact@v4
        with:
          name: checkpoint-tc-${{ inputs.job_id }}
          path: ./hls/

      - name: Transcode to HLS
        if: inputs.skip_transcode != 'true'
        run: |
          INPUT_FILE="${{ steps.detect.outputs.input_file }}"
          SOURCE_HEIGHT=${{ steps.detect.outputs.source_height }}
          if [ "$SOURCE_HEIGHT" -gt 1080 ] || [ "$SOURCE_HEIGHT" -eq 0 ]; then
            TARGET_HEIGHT=1080
          else
            TARGET_HEIGHT=$SOURCE_HEIGHT
          fi
          echo "Target resolution: ${TARGET_HEIGHT}p"

          chmod +x .github/scripts/*.sh
          .github/scripts/monitor-transcode.sh \
            "${{ inputs.job_id }}" \
            "${{ inputs.callback_url }}" \
            "${{ inputs.callback_token }}" \
            "$INPUT_FILE" \
            "$SOURCE_HEIGHT"

          # Report transcode checkpoint
          .github/scripts/callback.sh "${{ inputs.job_id }}" "checkpoint" \
            '{"checkpoint":"transcode","artifact_id":"checkpoint-tc-${{ inputs.job_id }}"}'

      - name: Save transcode checkpoint
        if: inputs.skip_transcode != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: checkpoint-tc-${{ inputs.job_id }}
          path: ./hls/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload to Discord
        env:
          DISCORD_BOT_TOKEN: ${{ inputs.discord_bot_token }}
          DISCORD_CHANNEL_ID: ${{ inputs.discord_channel_id }}
        run: |
          chmod +x .github/scripts/upload-to-discord.sh
          .github/scripts/upload-to-discord.sh "${{ inputs.job_id }}" \
            "${{ env.CALLBACK_URL }}" "${{ env.CALLBACK_TOKEN }}" ./hls

      - name: Report completion
        if: success()
        run: |
          INPUT_FILE="${{ steps.detect.outputs.input_file }}"
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=n:0 "$INPUT_FILE" 2>/dev/null || echo "0")
          SOURCE_HEIGHT=${{ steps.detect.outputs.source_height }}
          if [ "$SOURCE_HEIGHT" -gt 1080 ] || [ "$SOURCE_HEIGHT" -eq 0 ]; then
            RESOLUTION="1080p"
          else
            RESOLUTION="${SOURCE_HEIGHT}p"
          fi

          .github/scripts/callback.sh "${{ inputs.job_id }}" "complete" \
            "{\"video_resolution\":\"$RESOLUTION\",\"duration_seconds\":$DURATION}"
          echo "Pipeline completed successfully for job ${{ inputs.job_id }}"

      - name: Report failure
        if: failure()
        run: |
          .github/scripts/callback.sh "${{ inputs.job_id }}" "failed" \
            "{\"error_message\":\"Pipeline failed at step: ${{ job.status }}\"}"
