name: StreamVault Pipeline

# This workflow downloads torrents with transmission-cli, transcodes to HLS,
# then uploads chunks to Discord.
#
# Key inputs:
#   - file_idx: File index within torrent (0-based)
#   - torrent_name: Exact filename from Torrentio behaviorHints.filename
#
# File detection strategy:
#   1. Exact match by torrent_name
#   2. Partial match by base filename
#   3. Fallback to any video file by extension

concurrency:
  group: ${{ inputs.job_id }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'StreamVault job ID'
        required: true
        type: string
      magnet_uri:
        description: 'Magnet link to download'
        required: true
        type: string
      file_idx:
        description: 'File index within torrent'
        required: true
        type: string
        default: '0'
      torrent_name:
        description: 'Original torrent name from Torrentio'
        required: false
        type: string
        default: ''
      callback_url:
        description: 'Backend callback base URL'
        required: true
        type: string
      callback_token:
        description: 'Auth token for callbacks'
        required: true
        type: string
      discord_bot_token:
        description: 'Discord bot token for HLS upload'
        required: false
        type: string
        default: ''
      discord_channel_id:
        description: 'Discord channel ID for HLS upload'
        required: false
        type: string
        default: ''
env:
  CALLBACK_URL: ${{ inputs.callback_url }}
  CALLBACK_TOKEN: ${{ inputs.callback_token }}
  JOB_ID: ${{ inputs.job_id }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/pipeline-runner:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 1440
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download torrent
        run: |
          chmod +x .github/scripts/*.sh
          .github/scripts/monitor-transmission.sh \
            "${{ inputs.job_id }}" \
            "${{ inputs.callback_url }}" \
            "${{ inputs.callback_token }}" \
            "${{ inputs.magnet_uri }}" \
            "${{ inputs.file_idx }}"

      - name: Detect source resolution
        id: detect
        shell: bash
        run: |
          # First: use exact path from monitor.sh if it saved one
          if [ -f ./downloads/.selected_path ]; then
            INPUT_FILE=$(cat ./downloads/.selected_path)
            if [ -f "$INPUT_FILE" ]; then
              echo "✓ Using selected path from monitor.sh: $INPUT_FILE"
            else
              echo "⚠ .selected_path exists but file not found: $INPUT_FILE"
              INPUT_FILE=""
            fi
          fi

          # Fallback: find largest video file
          if [ -z "$INPUT_FILE" ]; then
            INPUT_FILE=$(find ./downloads -type f -size +100M \
              \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.avi" -o -iname "*.mov" \) \
              -not -name "*.log" -not -name "*.torrent" \
              -exec ls -1S {} + 2>/dev/null | head -1)
          fi

          # Final fallback: any video (might be single file < 100M)
          if [ -z "$INPUT_FILE" ]; then
            INPUT_FILE=$(find ./downloads -type f \
              \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.avi" -o -iname "*.mov" \) \
              -not -name "*.log" -not -name "*.torrent" \
              -exec ls -1S {} + 2>/dev/null | head -1)
          fi

          if [ -z "$INPUT_FILE" ]; then
            echo "❌ Error: No video file found in ./downloads"
            ls -la ./downloads/
            exit 1
          fi
          echo "input_file=$INPUT_FILE" >> "$GITHUB_OUTPUT"
          echo "Input file: $INPUT_FILE"
          echo "File size: $(du -h "$INPUT_FILE" | cut -f1)"

          # Try resolution from filename (e.g., ...1080p...)
          BASE_NAME=$(basename "$INPUT_FILE")
          if [[ "$BASE_NAME" =~ ([0-9]{3,4})p ]]; then
            SOURCE_HEIGHT="${BASH_REMATCH[1]}"
            echo "⚡ Detected resolution from filename: ${SOURCE_HEIGHT}p"
          else
            SOURCE_HEIGHT=$(ffprobe -v error -select_streams v -show_entries stream=height -of csv=p=n "$INPUT_FILE" 2>/dev/null | sort -nr | head -n1 || echo "0")
            if [ -z "$SOURCE_HEIGHT" ] || [ "$SOURCE_HEIGHT" = "0" ]; then
              echo "⚠ WARNING: Could not determine video height, trying alternative method"
              SOURCE_HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=p=n:0 "$INPUT_FILE" 2>/dev/null || echo "0")
            fi
          fi

          echo "source_height=$SOURCE_HEIGHT" >> "$GITHUB_OUTPUT"

      - name: Transcode to HLS
        run: |
          INPUT_FILE="${{ steps.detect.outputs.input_file }}"
          SOURCE_HEIGHT=${{ steps.detect.outputs.source_height }}
          # Keep original resolution, cap at 1080p
          if [ "$SOURCE_HEIGHT" -ge 1080 ] || [ "$SOURCE_HEIGHT" -eq 0 ]; then
            TARGET_HEIGHT=1080
          else
            TARGET_HEIGHT=$SOURCE_HEIGHT
          fi
          echo "Target: ${TARGET_HEIGHT}p"

          HLS_DIR="./hls"
          LOG_FILE="/tmp/ffmpeg_transcode.log"
          TOTAL_DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$INPUT_FILE" 2>/dev/null | cut -d. -f1)
          TOTAL_DURATION=${TOTAL_DURATION:-600}
          # Re-encode — force keyframes every 1s so segment cap splits at ~1MB
          mkdir -p "$HLS_DIR"
          rm -f "$LOG_FILE"
          ffmpeg -y \
            -i "$INPUT_FILE" \
            -map 0:v:0 -map 0:a:0 \
            -c:v libx264 -profile:v high -preset veryfast -crf 28 -pix_fmt yuv420p \
            -c:a aac -ac 2 -b:a 128k \
            -vf "scale=-2:$TARGET_HEIGHT:flags=lanczos" \
            -g 30 -keyint_min 30 \
            -hls_time 1 \
            -hls_segment_size 1000000 \
            -hls_segment_filename "${HLS_DIR}/seg_%04d.ts" \
            -hls_playlist_type vod \
            -max_muxing_queue_size 1024 \
            -threads 2 \
            "${HLS_DIR}/master.m3u8" 2> "$LOG_FILE" &
          FFMPEG_PID=$!
          # Kill ffmpeg on exit/cancel — prevents orphaned processes
          trap 'kill $FFMPEG_PID 2>/dev/null; trap - EXIT; exit' EXIT TERM INT
          echo "ffmpeg PID=$FFMPEG_PID"

          # Monitor ffmpeg progress
          LAST_REPORT=0
          while kill -0 "$FFMPEG_PID" 2>/dev/null; do
            sleep 5
            LAST_LINE=$(tail -1 "$LOG_FILE" 2>/dev/null || true)
            if echo "$LAST_LINE" | grep -q "time="; then
              TIMESTAMP=$(echo "$LAST_LINE" | grep -oP 'time=\K[\d:.]+' || true)
              if [ -n "$TIMESTAMP" ]; then
                SECONDS_ELAPSED=$(echo "$TIMESTAMP" | awk -F: '{ print ($1 * 3600) + ($2 * 60) + $3 }')
                PCT=$(echo "scale=1; $SECONDS_ELAPSED * 100 / $TOTAL_DURATION" | bc 2>/dev/null || echo "0")
                PCT=$(echo "$PCT" | awk '{if($1>99)$1=99; if($1<1)$1=1; print $1}')
                PCT_INT=${PCT%.*}
                PCT_INT=${PCT_INT:-0}

                NOW=$(date +%s)
                if [ $(( NOW - LAST_REPORT )) -ge 10 ] && [ "$PCT_INT" -gt 0 ] 2>/dev/null; then
                  .github/scripts/callback.sh "${{ inputs.job_id }}" "progress" \
                    "$(jq -n --arg p 'transcode' --argjson pp "${PCT_INT:-0}" '{phase: $p, progress_pct: $pp}')"
                  echo "Transcode: ${PCT}% (${TIMESTAMP})"
                fi
              fi
            fi
          done

          wait "$FFMPEG_PID"
          FFMPEG_EXIT=$?
          echo "ffmpeg exit: $FFMPEG_EXIT"

          if [ $FFMPEG_EXIT -ne 0 ]; then
            echo "Transcode failed"
            echo "--- last 20 log lines ---"
            tail -20 "$LOG_FILE"
            exit 1
          fi

          TOTAL_CHUNKS=$(ls "${HLS_DIR}"/seg_*.ts 2>/dev/null | wc -l)
          echo "Transcode complete: $TOTAL_CHUNKS chunks"

          .github/scripts/callback.sh "${{ inputs.job_id }}" "progress" \
            '{"phase":"transcode","progress_pct":100}'

      - name: Upload to Discord
        env:
          DISCORD_BOT_TOKEN: ${{ inputs.discord_bot_token }}
          DISCORD_CHANNEL_ID: ${{ inputs.discord_channel_id }}
        run: |
          chmod +x .github/scripts/upload-to-discord.sh
          .github/scripts/upload-to-discord.sh \
            "${{ inputs.job_id }}" \
            "${{ inputs.callback_url }}" \
            "${{ inputs.callback_token }}" \
            "./hls"

      - name: Report completion
        if: success()
        run: |
          INPUT_FILE="${{ steps.detect.outputs.input_file }}"
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=n:0 "$INPUT_FILE" 2>/dev/null || echo "0")
          SOURCE_HEIGHT=${{ steps.detect.outputs.source_height }}
          if [ "$SOURCE_HEIGHT" -gt 1080 ] || [ "$SOURCE_HEIGHT" -eq 0 ]; then
            RESOLUTION="1080p"
          else
            RESOLUTION="${SOURCE_HEIGHT}p"
          fi

          chmod +x .github/scripts/*.sh
          .github/scripts/callback.sh "${{ inputs.job_id }}" "complete" \
            "{\"video_resolution\":\"$RESOLUTION\",\"duration_seconds\":$DURATION}"
          echo "Pipeline completed successfully for job ${{ inputs.job_id }}"

      - name: Report failure
        if: failure()
        run: |
          chmod +x .github/scripts/*.sh
          .github/scripts/callback.sh "${{ inputs.job_id }}" "failed" \
            "{\"error_message\":\"Pipeline failed at step: ${{ job.status }}\"}"
